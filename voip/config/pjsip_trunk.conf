; StrikeCore PBX — Bitcall.io SIP Trunk
; ========================================
;
; Provider: Bitcall (https://bitcall.io)
; Panel:    https://panel.bitcall.io
; Payment:  Bitcoin / USDT / ETH — No KYC, self-service
; Rate IT:  ~$0.029/min (per-second billing)
; Gateway:  gateway.bitcall.io (188.34.143.144)
;
; ISTRUZIONI:
; 1. Registrati su https://panel.bitcall.io/login (sign up)
; 2. Ricarica con BTC, USDT o ETH
; 3. Dal pannello, attiva SIP trunk e ottieni username + password
; 4. Sostituisci SIP_USERNAME e SIP_PASSWORD qui sotto
; 5. Reload: asterisk -rx "pjsip reload"

; === Registration ===
[trunk-registration]
type=registration
transport=transport-udp
outbound_auth=trunk-auth
server_uri=sip:gateway.bitcall.io:5060
client_uri=sip:SIP_USERNAME@gateway.bitcall.io
retry_interval=60
contact_user=SIP_USERNAME

; === Auth ===
[trunk-auth]
type=auth
auth_type=userpass
username=SIP_USERNAME
password=SIP_PASSWORD

; === Endpoint ===
[trunk-endpoint]
type=endpoint
transport=transport-udp
context=from-trunk
disallow=all
allow=ulaw
allow=alaw
allow=g729
outbound_auth=trunk-auth
aors=trunk-aor
from_user=SIP_USERNAME
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
direct_media=no

; === AOR ===
[trunk-aor]
type=aor
contact=sip:gateway.bitcall.io:5060
qualify_frequency=60

; === Identify (inbound from provider) ===
[trunk-identify]
type=identify
endpoint=trunk-endpoint
match=188.34.143.144/32
