; StrikeCore PBX — PJSIP Configuration
; ======================================

; === Transport: UDP (standard SIP) ===
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; === Transport: WSS (WebRTC from dashboard) ===
[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089

; === WebRTC endpoint (dashboard browser) ===
; The operator calls from the dashboard browser via WebRTC
[webrtc-operator]
type=endpoint
transport=transport-wss
context=from-internal
disallow=all
allow=opus
allow=ulaw
allow=alaw
dtls_auto_generate_cert=yes
webrtc=yes
aors=webrtc-operator
auth=webrtc-operator-auth

[webrtc-operator-auth]
type=auth
auth_type=userpass
username=operator
password=strikecore2026

[webrtc-operator]
type=aor
max_contacts=5
remove_existing=yes

; === Softphone endpoint (for SIP softphones like Obox, Linphone) ===
[softphone]
type=endpoint
transport=transport-udp
context=from-internal
disallow=all
allow=ulaw
allow=alaw
allow=g722
allow=opus
aors=softphone
auth=softphone-auth
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[softphone-auth]
type=auth
auth_type=userpass
username=softphone
password=strikecore2026

[softphone]
type=aor
max_contacts=3
remove_existing=yes

; === SIP trunk (configured separately in pjsip_trunk.conf) ===
#include pjsip_trunk.conf
