; StrikeCore PBX — Dialplan
; ==========================

[general]
static=yes
writeprotect=no

; === Internal calls (from dashboard WebRTC or softphone) ===
[from-internal]
; Outbound call via SIP trunk
; Dial format: number (e.g., 393401234567 for Italian mobile)
exten => _X.,1,NoOp(StrikeCore outbound call to ${EXTEN})
 same => n,Set(CALLID=${UNIQUEID})
 same => n,Set(CDR(target)=${EXTEN})
 ; Start packet capture for this call
 same => n,System(tshark -i any -f "udp and portrange 10000-20000" -w /var/log/asterisk/pcap/${CALLID}.pcap -a duration:300 &)
 same => n,Set(PCAP_PID=${SHELL(echo $!)})
 ; Dial via trunk
 same => n,Dial(PJSIP/${EXTEN}@trunk-endpoint,60,g)
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?answered:hangup)
 same => n(answered),NoOp(Call answered - capturing RTP)
 same => n,Hangup()
 same => n(hangup),NoOp(Call not answered: ${DIALSTATUS})
 same => n,System(kill ${PCAP_PID} 2>/dev/null)
 same => n,Hangup()

; Hangup handler — stop PCAP and process
exten => h,1,NoOp(Call ended, processing capture)
 same => n,System(kill ${PCAP_PID} 2>/dev/null)
 same => n,System(python3 /home/mariello/strikecore/voip/scripts/process_pcap.py /var/log/asterisk/pcap/${CALLID}.pcap ${EXTEN} &)

; === Incoming calls from SIP trunk ===
[from-trunk]
exten => _X.,1,NoOp(Incoming call from ${CALLERID(num)})
 same => n,Set(CALLID=${UNIQUEID})
 same => n,System(tshark -i any -f "udp and portrange 10000-20000" -w /var/log/asterisk/pcap/${CALLID}.pcap -a duration:300 &)
 same => n,Dial(PJSIP/webrtc-operator&PJSIP/softphone,30)
 same => n,Hangup()
